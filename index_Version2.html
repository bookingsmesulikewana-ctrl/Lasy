<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Options</title>
    <script>
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(function() {
                alert('Copied to clipboard: ' + text);
            }, function(err) {
                console.error('Could not copy text: ', err);
            });
        }
    </script>
</head>
<body>
    <h1>Payment Options</h1>
    <h2>PayPal</h2>
    <p>Email: <span id="paypal-email">bookings.mesulikewana@gmail.com</span></p>
    <button onclick="copyToClipboard(document.getElementById('paypal-email').innerText)">Copy PayPal Email</button>

    <h2>EFT Capitec Bank</h2>
    <p>Account Number: <span id="capitec-account">1673760838</span></p>
    <p>Account Holder: Mr M Kewana</p>
    <button onclick="copyToClipboard(document.getElementById('capitec-account').innerText)">Copy Account Number</button>
</body>
</html>
